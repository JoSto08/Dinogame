<body>
  <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kanye Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game">
      <div id="kanye"></div>
      <div id="rock"></div>
    </div>
    <h1 id="score">0</h1>
    <button id="startButton">Start</button>
    <script src="script.js"></script>
  </body>
</html>


  <script>
    const kanye = document.getElementById("kanye");
const rock = document.getElementById("rock");
const scoreEl = document.getElementById("score");
const startButton = document.getElementById("startButton");

let score = 0;
let running = false;

// Spring-Variablen für verbessertes Springverhalten
let jumpSpeed = 0;
let gravity = 0.7;
let isJumping = false;

// Funktion für Start-Button
startButton.addEventListener("click", () => {
  console.log("Start-Button geklickt");
  startGame();
});

function resetRock() {
  rock.style.left = "550px";
  rock.style.display = "block";
  rock.style.animation = "";
}

function jump() {
  if (!isJumping && running) {
    jumpSpeed = -13; // Start-Geschwindigkeit: höherer Sprung
    isJumping = true;
  }
}

document.addEventListener("keydown", (event) => {
  if (event.code === "Space") {
    if (running) {
      jump();
    }
  }
});

function startGame() {
  score = 0;
  scoreEl.innerText = score;
  running = true;
  resetRock();
  rock.style.animation = "rock 1.33s infinite linear";
  startButton.style.display = "none";
  kanye.style.top = "225px";
  isJumping = false;
  jumpSpeed = 0;
}

function stopGame() {
  running = false;
  rock.style.animation = "";
  resetRock();
  startButton.style.display = "block";
}

setInterval(() => {
  if (!running) return;

  // SPRUNGVERHALTEN VERBESSERT:
  // kanye bewegt sich mit Geschwindigkeit und Schwerkraft (Parabel statt CSS-Animation).
  let kanyeTop = parseInt(kanye.style.top || "225"); // Default = Boden

  if (isJumping) {
    kanyeTop += jumpSpeed;
    jumpSpeed += gravity;

    if (kanyeTop > 225) { // Boden erreicht!
      kanyeTop = 225;
      isJumping = false;
      jumpSpeed = 0;
    }
    if (kanyeTop < 0) { // Maximale Sprunghöhe
      kanyeTop = 0;
      jumpSpeed = 0;
    }
    kanye.style.top = kanyeTop + "px";
  }

  // Stein bewegt sich wie vorher (über Animation)

  // Score erhöhen
  score += 2;
  scoreEl.innerText = score;

  // Kollisionserkennung
  const rockLeft = parseInt(getComputedStyle(rock).getPropertyValue("left"));
  const kanyeBottom = kanyeTop + 75;
  const rockTop = 250; // Stein "Boden"-Position
  const rockBottom = rockTop + 50;

  if (
    rockLeft < 100 &&
    rockLeft > 25 &&
    kanyeBottom > rockTop
  ) {
    stopGame();
  }

  if (rockLeft < 0) {
    rock.style.display = "none";
  } else {
    rock.style.display = "block";
  }
}, 20);


 

  </script>
</body>
</html>
